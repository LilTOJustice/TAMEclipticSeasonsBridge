name: Publish mod

on:
  push:

env:
  JAVA_VERSION: 21
  MODRINTH_TOKEN: ${{ secrets.PUBLISH_MODRINTH_TOKEN }}
  CURSEFORGE_TOKEN: ${{ secrets.PUBLISH_CURSEFORGE_TOKEN }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check Environment Variables
        run: env

      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v2
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Make Gradle Wrapper Executable
        if: ${{ runner.os != 'Windows' }}
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build

      - name: Publish (CurseForge/Modrinth)
        env:
          MINECRAFT_VERSION: ${{needs.determine-versions.outputs.minecraft_version}}
          MOD_VERSION: ${{needs.determine-versions.outputs.mod_version}}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: tam-ecliptic-seasons-bridge
          curseforge-token: "${{env.CURSEFORGE_TOKEN}}"

          modrinth-id: cfUwheE4
          modrinth-token: "${{env.MODRINTH_TOKEN}}"

          name: "TAM Ecliptic Seasons Bridge for Minecraft ${{env.MINECRAFT_VERSION}}"
          version: "${{env.MINECRAFT_VERSION}}"
          version-type: release

          game-versions: "${{env.MINECRAFT_VERSION}}"
          java: "${{env.JAVA_VERSION}}"